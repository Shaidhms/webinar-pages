<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webinar Pages</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 60px 20px;
  }

  .container { max-width: 800px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 64px; }

  .badge {
    display: inline-block;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.25);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #f59e0b;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 700;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #f59e0b 60%, #f97316 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 1.05rem;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .count {
    display: inline-block;
    margin-top: 16px;
    font-size: 0.85rem;
    color: #64748b;
  }

  .count strong { color: #f59e0b; }

  .pages-grid { display: grid; gap: 16px; }

  .page-card {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px 28px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    text-decoration: none;
    color: #e2e8f0;
    transition: all 0.3s;
  }

  .page-card:hover {
    border-color: rgba(245,158,11,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .page-number {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(245,158,11,0.1);
    color: #f59e0b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .page-info h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
  .page-info .date { font-size: 0.8rem; color: #94a3b8; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #64748b;
  }
  .empty-state p { font-size: 1.1rem; margin-bottom: 8px; }
  .empty-state .hint { font-size: 0.85rem; color: #475569; }

  footer {
    text-align: center;
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid #1e293b;
    color: #475569;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">Auto-Generated</div>
    <h1>Webinar Pages</h1>
    <p class="subtitle">Beautiful summaries of webinars, workshops, and meetings. Recorded, transcribed, and published automatically.</p>
    <p class="count"><strong>2</strong> pages published</p>
  </header>

  <div class="pages-grid">
    <a href="pages/demo-skool-natevideo.html" class="page-card">
      <div class="page-number">2</div>
      <div class="page-info">
        <h3>DEMO_SKOOL_NATEVIDEO</h3>
        <span class="date">March 23, 2026</span>
      </div>
    </a>
    <a href="pages/demo-webinar-agent.html" class="page-card">
      <div class="page-number">1</div>
      <div class="page-info">
        <h3>Demo Webinar agent</h3>
        <span class="date">March 23, 2026</span>
      </div>
    </a>
  </div>

  <footer>Powered by Webinar Agent</footer>
</div>
</body>
</html>
